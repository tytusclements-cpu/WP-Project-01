<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recipe Studio — Compare Ingredients</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header" role="banner">
    <div class="container header-inner">
      <a class="brand" href="index.html">Recipe Studio</a>
      <nav class="main-nav" role="navigation" aria-label="Main">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="recipes.html">Recipes</a></li>
          <li><a href="compare.html" aria-current="page">Compare</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <button id="theme-toggle-4" class="btn">Toggle theme</button>
      </div>
    </div>
  </header>

  <main id="main" class="container" role="main">
    <section aria-labelledby="compare-heading">
      <h1 id="compare-heading">Compare Ingredients & Substitutes</h1>
      <p class="lead">Select an ingredient to view alternatives and notes.</p>

      <div class="compare-grid">
        <div>
          <label for="ingredient-select">Ingredient</label>
          <select id="ingredient-select">
            <!-- populated by JS -->
          </select>
        </div>

        <div id="substitutes" class="card">
          <!-- populated by JS -->
          <p>Select an ingredient to see substitutes.</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <p>© <span id="year-4"></span> Recipe Studio</p>
    </div>
  </footer>

  <script src="js/app.js" defer></script>
</body>
</html>
